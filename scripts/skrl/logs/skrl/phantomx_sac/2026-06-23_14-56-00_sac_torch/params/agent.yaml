seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    clip_actions: true
    clip_actions_min: -1.0
    clip_actions_max: 1.0
    clip_log_std: true
    min_log_std: -5.0
    max_log_std: 2.0
    initial_log_std: 1.0
    network:
    - name: net
      input: OBSERVATIONS
      layers:
      - 256
      - 256
      activations: elu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 256
      - 256
      activations: elu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 256
      - 256
      activations: elu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 256
      - 256
      activations: elu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 256
      - 256
      activations: elu
    output: ONE
memory:
  class: RandomMemory
  memory_size: 100000
agent:
  class: SAC
  gradient_steps: 4
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 0.001
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: {}
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  random_timesteps: 3000
  learning_starts: 3000
  grad_norm_clip: 1.0
  learn_entropy: true
  initial_entropy_value: 1.0
  target_entropy: -18.0
  mixed_precision: true
  rewards_shaper_scale: 1.0
  experiment:
    directory: /workspace/projects/phantomx_thesis/scripts/skrl/logs/skrl/phantomx_sac
    experiment_name: 2026-06-23_14-56-00_sac_torch
    write_interval: auto
    checkpoint_interval: auto
trainer:
  class: SequentialTrainer
  timesteps: 1000000
  environment_info: log
  close_environment_at_exit: false
