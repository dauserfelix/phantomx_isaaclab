seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    clip_actions: true
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
    - name: net
      input: OBSERVATIONS
      layers:
      - 128
      - 128
      activations: elu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 128
      - 128
      activations: elu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 128
      - 128
      activations: elu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 128
      - 128
      activations: elu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 128
      - 128
      activations: elu
    output: ONE
memory:
  class: RandomMemory
  memory_size: 100000
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 0.0003
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: {}
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  random_timesteps: 10000
  learning_starts: 10000
  grad_norm_clip: 0.0
  learn_entropy: true
  initial_entropy_value: 0.2
  target_entropy: null
  mixed_precision: false
  experiment:
    directory: /workspace/projects/phantomx_thesis/scripts/skrl/logs/skrl/phantomx_sac
    experiment_name: 2026-06-09_12-16-26_sac_torch
    write_interval: auto
    checkpoint_interval: auto
trainer:
  class: SequentialTrainer
  timesteps: 1000000
  environment_info: log
  close_environment_at_exit: false
