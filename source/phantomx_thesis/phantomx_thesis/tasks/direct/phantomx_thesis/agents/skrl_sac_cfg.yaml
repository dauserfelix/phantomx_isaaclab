seed: 42

models:
  separate: True  # SAC braucht immer separate Modelle
  policy:
    class: GaussianMixin
    clip_actions: False          # wichtig bei SAC — tanh squashing ->geändert auf False am 09.06.2026
    clip_log_std: True
    min_log_std: -5.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128]
        activations: elu
    output: ACTIONS

  critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [128, 128]
        activations: elu
    output: ONE

  critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [128, 128]
        activations: elu
    output: ONE

  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [128, 128]
        activations: elu
    output: ONE

  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([OBSERVATIONS, ACTIONS])
        layers: [128, 128]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 200000     # erhöht von 100000 — mehr Diversität bevor Buffer refüllt

agent:
  class: SAC
  gradient_steps: 1        # war 4 — weniger aggressiv, verhindert Critic-Overfitting
  batch_size: 2048         # war 4096 — passt zu reduziertem gradient_steps
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 3.0e-4      # Standard für SAC , davor. learning_rate: 1.0e-3
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: {}
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  state_preprocessor: null
  state_preprocessor_kwargs: null
  random_timesteps: 3000
  learning_starts: 3000
  grad_norm_clip: 0.5      # war 1.0 — stärkeres Clipping bremst frühe Divergenz
  learn_entropy: False   # war True — α kollabiert immer gegen 0 (monoton fallender Gradient), was Q-Overestimation antreibt
  initial_entropy_value: 0.2  # festes α = 0.2 für gesamtes Training
  target_entropy: -9.0        # nur noch als Referenz, wird nicht mehr verwendet     # war -18.0 — hälfte von -dim(A), erhält Exploration länger
  mixed_precision: False #standard:true
  rewards_shaper_scale: 0.01    # war 1.0 — skaliert Q-Werte auf ~0-4 statt ~0-4e+15
  experiment:
    directory: "phantomx_sac"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

trainer:
  class: SequentialTrainer
  timesteps: 1000000
  environment_info: log