seed: 42

models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -2.0   # std=exp(-2)≈0.135 → Gelenk-Abweichung ≈0.07 rad statt 0.5 rad
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256, 128]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256, 128]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 24              # 24 steps × 512 envs = 12 288 transitions/update → 15 000 updates in 5h
  learning_epochs: 5
  mini_batches: 4           # batch_size = 24 × 512 / 4 = 3 072
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-4     # konservativer als 1e-3, stabiler
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.01  # etwas höher für bessere Exploration am Anfang
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 0.5
  time_limit_bootstrap: True  # wichtig: Timeout != Failure, Wert bootstrappen
  experiment:
    directory: "phantomx_ppo"
    experiment_name: ""
    write_interval: 6000       # TensorBoard alle ~5 min  (6000 / 20 it/s = 300s)
    checkpoint_interval: 120000  # Checkpoint alle ~100 min (120000 / 20 it/s ≈ 1.7h), 10 saves total

trainer:
  class: SequentialTrainer
  timesteps: 600000           # 1.2M steps @ 20 it/s = 60 000s ≈ 16.7h
  environment_info: log
